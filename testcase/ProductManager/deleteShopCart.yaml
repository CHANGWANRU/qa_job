- baseInfo:
    api_name: 删除购物车商品接口
    url: /coupApply/cms/delCart
    method: post
    header:
      Content-Type: application/x-www-form-urlencoded
  testCase:
    - case_name: 删除购物车成功
      data:
        productId: ${get_extract_data(goodsId,0)}
        timeStamp: ${timestamp()}
      validation:
        - contains: { 'message': 'success' }
        - contains: { 'error_code': '0000' }