#一个测试用例
- baseInfo:
    api_name: 用户登录
    url: /dar/user/login
    method: post
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 用户名和密码正确登录验证
      data: #不同情况下关键字填的东西不同哦
        user_name: test01
        passwd: admin123
      validation:
        - eq: { 'msg': '登录成功' }
        - contains: { 'error_code': none }
      extract:
        token: $.token
